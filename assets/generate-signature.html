<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1056px; height: 160px; overflow: hidden; }
.sig {
  width: 1056px;
  height: 160px;
  background: #ffffff;
  display: flex;
  align-items: center;
  padding: 0 32px;
  font-family: Arial, Helvetica, sans-serif;
  border-top: 4px solid #0D7377;
}
.logo {
  height: 80px;
  border-radius: 10px;
  flex-shrink: 0;
}
.divider {
  width: 2px;
  height: 70px;
  background: #E2E8F0;
  margin: 0 28px;
  flex-shrink: 0;
}
.text .title {
  font-size: 22px;
  font-weight: 700;
  color: #0A5C5F;
  margin-bottom: 4px;
}
.text .subtitle {
  font-size: 16px;
  color: #718096;
  margin-bottom: 4px;
}
.text .link {
  font-size: 16px;
  color: #0D7377;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="sig">
  <img class="logo" src="apm-logo-pill-web.png" alt="APM">
  <div class="divider"></div>
  <div class="text">
    <div class="title">APM + Instituto i10</div>
    <div class="subtitle">Consultoria FUNDEB 2026 · São Paulo</div>
    <div class="link">apm-fundeb-sp.vercel.app</div>
  </div>
</div>
</body>
</html>
